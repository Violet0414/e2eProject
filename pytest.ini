[pytest]
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v -s --tb=short -p no:cacheprovider
filterwarnings =
    ignore::DeprecationWarning
    ignore::UserWarning
markers =
    positive: 正向测试用例
    negative: 反向测试用例
    smoke: 冒烟测试用例
disable_test_id_escaping_and_forfeit_all_rights_to_community_support = True
